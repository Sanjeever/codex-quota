name: Build release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Package Windows
        if: runner.os == 'Windows'
        run: pnpm exec electron-builder --win --publish never

      - name: Package macOS
        if: runner.os == 'macOS'
        run: pnpm exec electron-builder --mac --publish never

      - name: Upload Windows release artifacts
        if: runner.os == 'Windows'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe

      - name: Upload macOS release artifacts
        if: runner.os == 'macOS'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
